server:
  port: 8080

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# Notification Service Configuration
notification:
  scheduler:
    poll-interval: 5000
    worker-pool-size: 10
    listen-channel: notification_channel   # PG LISTEN/NOTIFY 通道名，需与触发器中 pg_notify 的通道一致
    listen-poll-ms: 500                   # PG LISTEN 轮询间隔（毫秒），越小延迟越低但 CPU 开销越高
  retry:
    base-delay-seconds: 10
    max-retries: 6
    max-delay-seconds: 3600
  delivery:
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    max-response-log-length: 1024

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
    instances:
      vendor-default:
        base-config: default

# Actuator & Metrics
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.dddmingo.notification: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
