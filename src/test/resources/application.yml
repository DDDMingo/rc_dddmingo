server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false

notification:
  scheduler:
    poll-interval: 5000
    worker-pool-size: 2
  retry:
    base-delay-seconds: 1
    max-retries: 3
    max-delay-seconds: 60
  delivery:
    connect-timeout-ms: 1000
    read-timeout-ms: 2000
    max-response-log-length: 512

logging:
  level:
    com.dddmingo.notification: DEBUG
